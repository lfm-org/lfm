name: sisu-test

services:
  database-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: raidcal_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d raidcal_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test

  frontend-test:
    build:
      context: ./app
      target: e2e
    command: >
      sh -c "npx prisma db push --accept-data-loss &&
             npx ts-node --compiler-options '{\"module\":\"CommonJS\"}' prisma/seed.ts &&
             node server.js"
    environment:
      DATABASE_URL: postgresql://test:test@database-test:5432/raidcal_test
      TEST_MODE: "true"
      APP_BASE_URL: http://frontend-test:3001
      BATTLE_NET_REDIRECT_URI: http://frontend-test:3001/api/battlenet/callback
      BATTLE_NET_COOKIE_SECURE: "false"
      SISU_RAIDCAL_CLIENT_ID: "test"
      SISU_RAIDCAL_CLIENT_SECRET: "test"
      BATTLE_NET_REGION: eu
      HMAC_SECRET: "test-hmac-secret-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    depends_on:
      database-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - test

  playwright:
    build:
      context: .
      dockerfile: playwright/Dockerfile
    command: npx playwright test
    volumes:
      - ./app:/e2e
      - /e2e/node_modules
    environment:
      PLAYWRIGHT_BASE_URL: http://frontend-test:3001
    depends_on:
      frontend-test:
        condition: service_healthy
    networks:
      - test

networks:
  test:
    driver: bridge
