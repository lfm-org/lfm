services:
  app:
    build:
      context: ./app
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8080:3000"
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      SISU_RAIDCAL_CLIENT_ID: ${SISU_RAIDCAL_CLIENT_ID}
      SISU_RAIDCAL_CLIENT_SECRET: ${SISU_RAIDCAL_CLIENT_SECRET}
      BATTLE_NET_REGION: ${BATTLE_NET_REGION:-eu}
      BATTLE_NET_REDIRECT_URI: ${BATTLE_NET_REDIRECT_URI:-http://localhost:8080/api/battlenet/callback}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      BATTLE_NET_COOKIE_SECURE: ${BATTLE_NET_COOKIE_SECURE:-false}
      HMAC_SECRET: ${HMAC_SECRET}
  database:
    image: postgres:17-alpine
    env_file:
      - .env
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - database:/var/lib/postgresql/data

volumes:
  database:
