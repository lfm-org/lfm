services:
  frontend:
    build:
      target: dev
    command: npm run dev
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/.next
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      SISU_RAIDCAL_CLIENT_ID: ${SISU_RAIDCAL_CLIENT_ID}
      SISU_RAIDCAL_CLIENT_SECRET: ${SISU_RAIDCAL_CLIENT_SECRET}
      BATTLE_NET_REGION: ${BATTLE_NET_REGION:-eu}
      BATTLE_NET_REDIRECT_URI: http://localhost:3001/api/battlenet/callback
      APP_BASE_URL: http://localhost:3001
      BATTLE_NET_COOKIE_SECURE: "false"
      BLIZZARD_USERNAME: ""
      BLIZZARD_PASSWORD: ""
