version = 1

# Razor files cannot carry reliable SPDX headers:
# - @* Razor comments *@ are not recognised by the reuse tool
# - HTML comments <!-- --> render as visible HTML
[[annotations]]
path = ["**/*.razor"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 LFM contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Data and resource files
[[annotations]]
path = [
    "**/*.json",
    "**/*.resx",
    "**/*.csproj",
    "**/*.sln",
    "**/*.props",
    "**/packages.lock.json",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 LFM contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Binary assets
[[annotations]]
path = [
    "**/*.png",
    "**/*.svg",
    "**/*.ico",
    "**/*.jpg",
    "**/*.jpeg",
    "**/*.webp",
    "**/*.woff",
    "**/*.woff2",
    "**/*.ttf",
    "**/*.otf",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 LFM contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Markdown and documentation
[[annotations]]
path = ["**/*.md", "**/*.txt", "example.env", "NOTICE"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 LFM contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Build-time templates: source for files generated by the
# GenerateStaticTemplates MSBuild target in Lfm.App.csproj. These are
# plain text (security.txt.template) or JSON (staticwebapp.config.json.template)
# — JSON has no comment support so per-file SPDX headers are not feasible.
[[annotations]]
path = ["**/*.template"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 LFM contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# YAML, TOML, CSS, HTML, JS, MJS — file types used by config / static assets
# that either lack comment-placement rules (HTML/CSS hostile to comments above
# DOCTYPE) or are treated as data rather than source.
[[annotations]]
path = [
    "**/*.yml",
    "**/*.yaml",
    "**/*.toml",
    "**/*.css",
    "**/*.html",
    "**/*.js",
    "**/*.mjs",
    "**/.gitleaks.toml",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 LFM contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# Infrastructure-as-code that comes with its own comment syntax but is
# better covered collectively (Dockerfiles already take # comments but
# many contributors will not know that)
[[annotations]]
path = [
    "**/Dockerfile",
    "**/*.dockerignore",
    "**/.gitignore",
    "**/.gitattributes",
    "**/.editorconfig",
    "**/global.json",
    "**/ps-rule.yaml",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2026 LFM contributors"
SPDX-License-Identifier = "AGPL-3.0-or-later"
