000" stroke-width="1.25"/><g data-dediren-node-decorator="uml_action"></g><text x="738.0" y="144.0" text-anchor="middle" dominant-baseline="middle" fill="#000000" font-size="14.0"><tspan x="738.0" dy="0">Aggregate</tspan><tspan x="738.0" dy="16.0">workspace logs</tspan></text></g><g data-dediren-node-id="action-monitor-cosmos-429"><rect data-dediren-node-shape="uml_action" x="916.0" y="112.0" width="160.0" height="80.0" rx="12" fill="#ffffff" stroke="#000000" stroke-width="1.25"/><g data-dediren-node-decorator="uml_action"></g><text x="996.0" y="144.0" text-anchor="middle" dominant-baseline="middle" fill="#000000" font-size="14.0"><tspan x="996.0" dy="0">Monitor Cosmos</tspan><tspan x="996.0" dy="16.0">429s</tspan></text></g><g data-dediren-node-id="action-notify-throttle-alert"><rect data-dediren-node-shape="uml_action" x="1270.0" y="112.0" width="160.0" height="80.0" rx="12" fill="#ffffff" stroke="#000000" stroke-width="1.25"/><g data-dediren-node-decorator="uml_action"></g><text x="1350.0" y="144.0" text-anchor="middle" dominant-baseline="middle" fill="#000000" font-size="14.0"><tspan x="1350.0" dy="0">Notify throttle</tspan><tspan x="1350.0" dy="16.0">alert</tspan></text></g><g data-dediren-node-id="final-observability"><g data-dediren-node-shape="uml_activity_final_node"><circle cx="1544.0" cy="152.0" r="14.8" fill="#ffffff" stroke="#000000" stroke-width="1.25"/><circle cx="1544.0" cy="152.0" r="7.1" fill="#000000"/></g><g data-dediren-node-decorator="uml_activity_final_node"></g></g></g><script>//<![CDATA[
(function(){
var root=document.currentScript&&document.currentScript.closest?document.currentScript.closest('svg'):null;
if(!root){root=document.querySelector('svg');}
if(!root){return;}
var selected=null;
function clear(){var hl=root.querySelectorAll('.dediren-edge-highlighted');for(var i=0;i<hl.length;i++){hl[i].classList.remove('dediren-edge-highlighted');}selected=null;}
function select(id){clear();var edges=root.querySelectorAll('[data-dediren-edge-source]');for(var i=0;i<edges.length;i++){var e=edges[i];if(e.getAttribute('data-dediren-edge-source')===id||e.getAttribute('data-dediren-edge-target')===id){e.classList.add('dediren-edge-highlighted');}}selected=id;}
root.addEventListener('click',function(ev){var t=ev.target;var n=t.closest?t.closest('[data-dediren-node-id]'):null;if(n){var id=n.getAttribute('data-dediren-node-id');if(id===selected){clear();}else{select(id);}}else{clear();}});
document.addEventListener('keydown',function(ev){if(ev.key==='Escape'){clear();}});
})();
//]]></script></svg>

