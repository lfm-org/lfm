version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Group minor/patch updates into a single PR to reduce noise.
      dotnet-minor:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor:
        update-types: [minor, patch]

  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker-patch:
        update-types: [patch]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      docker-patch:
        update-types: [patch]
