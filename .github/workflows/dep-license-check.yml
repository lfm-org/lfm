name: Dep License Check

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.csproj'
      - '**/packages.lock.json'
      - 'Directory.Build.props'
      - '.config/dotnet-tools.json'
      - '.github/license-allowlist.txt'
      - '.github/license-url-mappings.json'
      - '.github/workflows/dep-license-check.yml'
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  dep-license-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore NuGet packages
        run: dotnet restore lfm.sln

      - name: Run nuget-license against allowlist
        run: |
          ALLOWED=$(grep -v '^#' .github/license-allowlist.txt | grep -v '^$' | paste -sd ';' -)
          dotnet tool run nuget-license \
            --input lfm.sln \
            --include-transitive \
            --allowed-license-types "$ALLOWED" \
            --licenseurl-to-license-mappings .github/license-url-mappings.json
