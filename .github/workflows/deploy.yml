name: Deploy

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Deploy stage (all runs both, infra/app runs one)'
        type: choice
        options:
          - all
          - infra
          - app
        default: all
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'api/**'
      - 'app/**'
      - 'shared/**'
      - 'lfm.sln'
      - 'global.json'
      - 'Directory.Packages.props'
      - 'scripts/check-bundle-size.sh'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/deploy-app-build.yml'
      - '.github/workflows/deploy-infra.yml'
      - '.github/workflows/deploy-app.yml'

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      infra: ${{ steps.resolve.outputs.infra }}
      app: ${{ steps.resolve.outputs.app }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            infra:
              - 'infra/**'
              - '.github/workflows/deploy-infra.yml'
            app:
              - 'api/**'
              - 'app/**'
              - 'shared/**'
              - 'lfm.sln'
              - 'global.json'
              - 'Directory.Packages.props'
              - 'scripts/check-bundle-size.sh'
              - '.github/workflows/deploy-app-build.yml'
              - '.github/workflows/deploy-app.yml'

      - name: Resolve change flags
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          STAGE: ${{ inputs.stage }}
          FILTER_INFRA: ${{ steps.filter.outputs.infra }}
          FILTER_APP: ${{ steps.filter.outputs.app }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$STAGE" = "all" ] || [ "$STAGE" = "infra" ]; then
              echo "infra=true" >> "$GITHUB_OUTPUT"
            else
              echo "infra=false" >> "$GITHUB_OUTPUT"
            fi
            if [ "$STAGE" = "all" ] || [ "$STAGE" = "app" ]; then
              echo "app=true" >> "$GITHUB_OUTPUT"
            else
              echo "app=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "infra=$FILTER_INFRA" >> "$GITHUB_OUTPUT"
            echo "app=$FILTER_APP" >> "$GITHUB_OUTPUT"
          fi

  secrets-scan:
    uses: ./.github/workflows/secrets-scan.yml
    secrets: inherit

  analyze-infra:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.infra == 'true'
    uses: ./.github/workflows/analyze-infra.yml
    secrets: inherit

  build-app:
    needs: [detect-changes, secrets-scan]
    if: |
      github.ref == 'refs/heads/main' &&
      needs.secrets-scan.result == 'success' &&
      needs.detect-changes.outputs.app == 'true'
    permissions:
      contents: read
      id-token: write
      attestations: write
    uses: ./.github/workflows/deploy-app-build.yml
    secrets: inherit

  deploy-infra:
    needs: [detect-changes, secrets-scan, analyze-infra]
    if: |
      github.ref == 'refs/heads/main' &&
      needs.secrets-scan.result == 'success' &&
      needs.analyze-infra.result == 'success' &&
      needs.detect-changes.outputs.infra == 'true'
    uses: ./.github/workflows/deploy-infra.yml
    secrets: inherit

  deploy-app:
    needs: [detect-changes, secrets-scan, analyze-infra, build-app, deploy-infra]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.secrets-scan.result == 'success' &&
      (needs.analyze-infra.result == 'success' || needs.analyze-infra.result == 'skipped') &&
      needs.build-app.result == 'success' &&
      needs.detect-changes.outputs.app == 'true' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    permissions:
      contents: read
      id-token: write
      attestations: read
    uses: ./.github/workflows/deploy-app.yml
    secrets: inherit
