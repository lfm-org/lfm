name: CI

on:
  workflow_dispatch:

jobs:
  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: 'pnpm'
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            functions/pnpm-lock.yaml
      - name: Restore tsbuildinfo and ESLint caches
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            frontend/.cache/.tsbuildinfo
            functions/.cache/.tsbuildinfo
            frontend/.cache/eslint
            functions/.cache/eslint
          key: tscache-${{ runner.os }}-${{ hashFiles('**/tsconfig*.json', '**/pnpm-lock.yaml') }}
          restore-keys: tscache-${{ runner.os }}-
      - name: Install dependencies
        working-directory: functions
        run: pnpm install --frozen-lockfile
      - name: Type check
        working-directory: functions
        run: pnpm exec tsc --noEmit

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: 'pnpm'
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            functions/pnpm-lock.yaml
      - name: Restore tsbuildinfo and ESLint caches
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            frontend/.cache/.tsbuildinfo
            functions/.cache/.tsbuildinfo
            frontend/.cache/eslint
            functions/.cache/eslint
          key: tscache-${{ runner.os }}-${{ hashFiles('**/tsconfig*.json', '**/pnpm-lock.yaml') }}
          restore-keys: tscache-${{ runner.os }}-
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Type check
        working-directory: frontend
        run: pnpm exec tsc --noEmit
      - name: Build
        working-directory: frontend
        run: pnpm exec vite build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          cache: 'pnpm'
          cache-dependency-path: |
            frontend/pnpm-lock.yaml
            functions/pnpm-lock.yaml
      - name: Restore tsbuildinfo and ESLint caches
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            frontend/.cache/.tsbuildinfo
            functions/.cache/.tsbuildinfo
            frontend/.cache/eslint
            functions/.cache/eslint
          key: tscache-${{ runner.os }}-${{ hashFiles('**/tsconfig*.json', '**/pnpm-lock.yaml') }}
          restore-keys: tscache-${{ runner.os }}-
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
        run: pnpm exec playwright install --with-deps chromium
      - name: Run end-to-end suite
        run: ./scripts/e2e-all.sh
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-artifacts
          path: frontend/e2e/test-results/
          if-no-files-found: ignore
