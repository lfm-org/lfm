name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Cache functions pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: functions/.cache/pnpm-store
          key: pnpm-functions-${{ runner.os }}-${{ hashFiles('functions/pnpm-lock.yaml') }}
          restore-keys: pnpm-functions-${{ runner.os }}-
      - name: Restore functions tsbuildinfo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: functions/.cache/.tsbuildinfo
          key: tscache-functions-${{ runner.os }}-${{ hashFiles('functions/tsconfig.json', 'functions/pnpm-lock.yaml') }}
          restore-keys: tscache-functions-${{ runner.os }}-
      - name: Install dependencies
        working-directory: functions
        run: pnpm install --frozen-lockfile
      - name: Type check
        working-directory: functions
        run: pnpm exec tsc --noEmit

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Cache frontend pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: frontend/.cache/pnpm-store
          key: pnpm-frontend-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-frontend-${{ runner.os }}-
      - name: Restore frontend tsbuildinfo cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            frontend/.cache/.tsbuildinfo
            frontend/.cache/.tsbuildinfo.node
          key: tscache-frontend-${{ runner.os }}-${{ hashFiles('frontend/tsconfig.json', 'frontend/tsconfig.node.json', 'frontend/pnpm-lock.yaml') }}
          restore-keys: tscache-frontend-${{ runner.os }}-
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Type check
        working-directory: frontend
        run: pnpm exec tsc --noEmit
      - name: Build
        working-directory: frontend
        run: pnpm exec vite build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Cache frontend pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: frontend/.cache/pnpm-store
          key: pnpm-frontend-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-frontend-${{ runner.os }}-
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ github.workspace }}/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
        run: pnpm exec playwright install --with-deps chromium
      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: frontend
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
        run: pnpm exec playwright install-deps chromium
      - name: Run end-to-end suite
        run: ./scripts/e2e-all.sh
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-artifacts
          path: frontend/e2e/test-results/
          if-no-files-found: ignore
