name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'app/**'
      - 'shared/**'
      - 'tests/**'
      - 'lfm.sln'
      - 'global.json'
      - 'Directory.Packages.props'
      - 'scripts/check-bundle-size.sh'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore lfm.sln

      - name: Format
        run: dotnet format lfm.sln --verify-no-changes --no-restore --severity error

      - name: Build
        run: dotnet build lfm.sln -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test API
        run: >
          dotnet test tests/Lfm.Api.Tests/Lfm.Api.Tests.csproj
          -c Release --no-build
          --logger "trx;LogFileName=api-tests.trx"
          --logger "console;verbosity=normal"
          --results-directory ./artifacts/test-results

      - name: Test App
        run: >
          dotnet test tests/Lfm.App.Tests/Lfm.App.Tests.csproj
          -c Release --no-build
          --logger "trx;LogFileName=app-tests.trx"
          --logger "console;verbosity=normal"
          --results-directory ./artifacts/test-results

      - name: Test App.Core
        run: >
          dotnet test tests/Lfm.App.Core.Tests/Lfm.App.Core.Tests.csproj
          -c Release --no-build
          --logger "trx;LogFileName=app-core-tests.trx"
          --logger "console;verbosity=normal"
          --results-directory ./artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dotnet-test-results
          path: ./artifacts/test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Publish check (API)
        run: dotnet publish api/Lfm.Api.csproj -c Release -o ./publish/api --no-build

      - name: Publish check (App)
        run: dotnet publish app/Lfm.App.csproj -c Release -o ./publish/app --no-build

      - name: Install brotli
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends brotli

      - name: Check bundle size budget
        # 5 MB is a regression gate, not a target. Baseline after Phase A
        # (Blazor WASM + FluentUI, no trimming) is ~3.74 MB brotli. Consider
        # installing `wasm-tools` workload + enabling IL trimming later to
        # tighten this to 2-3 MB.
        run: ./scripts/check-bundle-size.sh ./publish/app/wwwroot 5

      - name: Audit dependencies
        shell: bash
        run: |
          set -euo pipefail
          dotnet list lfm.sln package --vulnerable --include-transitive --format json > audit.json
          count=$(jq '[.. | objects | select(has("vulnerabilities")) | .vulnerabilities[]] | length' audit.json)
          if [ "$count" -gt 0 ]; then
            echo "FAIL: found $count vulnerable package reference(s)" >&2
            jq '.' audit.json >&2
            exit 1
          fi
          echo "No vulnerable packages."
