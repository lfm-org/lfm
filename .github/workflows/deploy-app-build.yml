name: Deploy App - Build

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: deploy-app-build-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-dotnet-cached

      - name: Restore
        run: dotnet restore lfm.sln -m:1

      - name: Audit dependencies
        shell: bash
        run: |
          set -euo pipefail
          dotnet list lfm.sln package --vulnerable --include-transitive --format json > audit.json
          count=$(jq '[.. | objects | select(has("vulnerabilities")) | .vulnerabilities[]] | length' audit.json)
          if [ "$count" -gt 0 ]; then
            echo "FAIL: vulnerable packages must be resolved before deploy" >&2
            jq '.' audit.json >&2
            exit 1
          fi

      - name: Build
        run: dotnet build lfm.sln -c Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Tests (parallel)
        run: ./scripts/run-tests-parallel.sh ./artifacts/test-results

      - name: Publish API
        run: dotnet publish api/Lfm.Api.csproj -c Release -o ./publish/api --no-build

      - name: Publish App
        env:
          PRIVACY_EMAIL: ${{ vars.PRIVACY_EMAIL }}
          EXPIRES_SECURITY_TXT: ${{ vars.EXPIRES_SECURITY_TXT }}
          FRONTEND_HOSTNAME: ${{ vars.FRONTEND_HOSTNAME }}
          SECURITY_POLICY_URL: ${{ vars.SECURITY_POLICY_URL }}
          API_HOSTNAME: ${{ vars.API_HOSTNAME }}
        run: dotnet publish app/Lfm.App.csproj -c Release -o ./publish/app --no-build

      - name: Generate SBOM
        run: |
          set -euo pipefail
          dotnet tool restore
          dotnet tool run dotnet-CycloneDX -- lfm.sln \
            --configuration Release \
            --disable-package-restore \
            --exclude-test-projects \
            --filename sbom.cdx.json \
            --output ./publish \
            --output-format Json
          test -s ./publish/sbom.cdx.json

      - name: Install brotli
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends brotli

      - name: Check bundle size budget
        run: ./scripts/check-bundle-size.sh ./publish/app/wwwroot 5

      - name: Upload bundle size report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deploy-app-bundle-size-report
          path: ./artifacts/bundle-size
          if-no-files-found: ignore
          retention-days: 1

      # dotnet publish emits `.azurefunctions/` (FunctionMetadataLoader + worker
      # extensions). upload-artifact defaults `include-hidden-files: false` on
      # purpose — setting it to true would widen the artifact to any hidden
      # path the build happens to produce (`.git/config`, `.env`, `.npmrc` …).
      # Tar exactly the one hidden directory we need into a normal-named file
      # so the artifact stays hidden-free while still carrying the Functions
      # runtime metadata. Reversed in deploy-app.yml.
      - name: Archive .azurefunctions metadata
        run: |
          set -euo pipefail
          tar -cf ./publish/api/azurefunctions.tar -C ./publish/api .azurefunctions
          rm -rf ./publish/api/.azurefunctions

      - name: Package deploy artifacts
        run: |
          set -euo pipefail
          mkdir -p ./publish/artifacts
          tar -cf ./publish/artifacts/deploy-api.tar -C ./publish/api .
          tar -cf ./publish/artifacts/deploy-app.tar -C ./publish/app .
          test -s ./publish/artifacts/deploy-api.tar
          test -s ./publish/artifacts/deploy-app.tar

      - name: Upload API publish artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deploy-app-publish-api
          path: ./publish/artifacts/deploy-api.tar
          if-no-files-found: error
          retention-days: 1

      - name: Upload App publish artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deploy-app-publish-app
          path: ./publish/artifacts/deploy-app.tar
          if-no-files-found: error
          retention-days: 1

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deploy-app-sbom
          path: ./publish/sbom.cdx.json
          if-no-files-found: error
          retention-days: 1

      - name: Attest API deploy artifact
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ./publish/artifacts/deploy-api.tar
          create-storage-record: false
          show-summary: false

      - name: Attest App deploy artifact
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ./publish/artifacts/deploy-app.tar
          create-storage-record: false
          show-summary: false

      - name: Attest API SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ./publish/artifacts/deploy-api.tar
          sbom-path: ./publish/sbom.cdx.json
          create-storage-record: false
          show-summary: false

      - name: Attest App SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: ./publish/artifacts/deploy-app.tar
          sbom-path: ./publish/sbom.cdx.json
          create-storage-record: false
          show-summary: false
