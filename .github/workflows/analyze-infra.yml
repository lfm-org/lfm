name: Analyze Infrastructure

on:
  pull_request:
    branches: [main]
    paths: [infra/**, ps-rule.yaml, .github/workflows/analyze-infra.yml]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  analyze:
    name: PSRule for Azure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run PSRule analysis
        uses: microsoft/ps-rule@46451b8f5258c41beb5ae69ed7190ccbba84112c # v2.9.0
        with:
          modules: PSRule.Rules.Azure
          outputFormat: Sarif
          outputPath: reports/ps-rule-results.sarif
          summary: true

      - name: Upload SARIF results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          name: PSRule-Sarif
          path: reports/ps-rule-results.sarif
          retention-days: 7
          if-no-files-found: ignore
