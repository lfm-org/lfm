name: Deploy Frontend

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
    paths: [frontend/**, .github/workflows/deploy-frontend.yml]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
      - name: Cache frontend pnpm store
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: frontend/.cache/pnpm-store
          key: pnpm-frontend-${{ runner.os }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-frontend-${{ runner.os }}-

      - name: Install and build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://${{ vars.API_HOSTNAME }}/api
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high
          pnpm exec vite build

      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: frontend/dist
          skip_app_build: true
