name: Deploy Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [functions/**, .github/workflows/deploy-functions.yml]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install and build
        working-directory: functions
        run: |
          npm ci
          npm audit
          npm run build

      - name: Prepare deployment package
        working-directory: functions
        run: |
          npm prune --production
          cd .. && zip -r /tmp/functions.zip functions/ -x 'functions/node_modules/.cache/*' 'functions/src/*' 'functions/.git*'

      - name: Deploy to Azure Functions
        run: |
          az functionapp deploy \
            --resource-group lfm \
            --name lfm-functions \
            --src-path /tmp/functions.zip \
            --type zip \
            --async false

      - name: Verify deployment health
        run: |
          url="https://lfm-api.dinosauruskeksi.com/api/health"
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 2 minutes — startup or migration may have failed"
          exit 1
