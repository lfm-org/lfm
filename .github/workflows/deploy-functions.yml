name: Deploy Functions

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: [main]
    paths: [functions/**, .github/workflows/deploy-functions.yml]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version

      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install and build
        working-directory: functions
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --audit-level=high
          pnpm run build

      - name: Prepare deployment package
        working-directory: functions
        run: |
          pnpm install --frozen-lockfile --prod

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@02a16c5f3a5707fa97fca56c202cc2ef6cc7dccb # v1
        with:
          app-name: lfm-functions
          package: functions

      - name: Verify deployment health
        run: |
          url="https://lfm-api.dinosauruskeksi.com/api/health"
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            if [ "$status" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $status, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 2 minutes — startup or migration may have failed"
          exit 1
