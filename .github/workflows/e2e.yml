name: E2E

on:
  # Auto-trigger on PRs disabled: flaky WCAG checks against FluentUI shadow DOM
  # produce intermittent failures, and the full stack (Cosmos + Azurite + Functions
  # + Playwright) chews through runner minutes on every push. Run manually from
  # the Actions tab when an E2E signal is actually needed.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-dotnet-cached

      - name: Install Azure Functions Core Tools
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo mv microsoft.gpg /etc/apt/trusted.gpg.d/microsoft.gpg
          sudo sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/repos/microsoft-ubuntu-$(lsb_release -cs)-prod $(lsb_release -cs) main" > /etc/apt/sources.list.d/dotnetdev.list'
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4

      - name: Restore
        run: dotnet restore lfm.sln -m:1

      - name: Build
        run: dotnet build lfm.sln -c Release --no-restore

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-dotnet-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: playwright-dotnet-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pwsh tests/Lfm.E2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pwsh tests/Lfm.E2E/bin/Release/net10.0/playwright.ps1 install-deps chromium

      - name: Run E2E
        run: >
          dotnet test tests/Lfm.E2E/Lfm.E2E.csproj
          -c Release --no-build
          --logger "trx;LogFileName=e2e.trx"
          --logger "console;verbosity=normal"
          --results-directory ./artifacts/e2e-results

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-results
          path: |
            ./artifacts/e2e-results
          if-no-files-found: ignore
          retention-days: 14
