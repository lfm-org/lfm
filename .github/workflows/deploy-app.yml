name: Deploy App

on:
  workflow_call:

permissions:
  id-token: write
  contents: read
  attestations: read

concurrency:
  group: deploy-app
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download API publish artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: deploy-app-publish-api
          path: ./publish/artifacts

      - name: Download App publish artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: deploy-app-publish-app
          path: ./publish/artifacts

      - name: Download SBOM artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: deploy-app-sbom
          path: ./publish

      - name: Verify artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh attestation verify ./publish/artifacts/deploy-api.tar -R "$GITHUB_REPOSITORY"
          gh attestation verify ./publish/artifacts/deploy-app.tar -R "$GITHUB_REPOSITORY"
          gh attestation verify ./publish/artifacts/deploy-api.tar -R "$GITHUB_REPOSITORY" --predicate-type https://cyclonedx.org/bom
          gh attestation verify ./publish/artifacts/deploy-app.tar -R "$GITHUB_REPOSITORY" --predicate-type https://cyclonedx.org/bom
          test -s ./publish/sbom.cdx.json

      - name: Extract deploy artifacts
        run: |
          set -euo pipefail
          mkdir -p ./publish/api ./publish/app
          tar -xf ./publish/artifacts/deploy-api.tar -C ./publish/api
          tar -xf ./publish/artifacts/deploy-app.tar -C ./publish/app
          test -d ./publish/api
          test -d ./publish/app

      # Reverses deploy-app-build.yml's `Archive .azurefunctions metadata`
      # step. See that step for the why.
      - name: Restore .azurefunctions metadata
        run: |
          set -euo pipefail
          tar -xf ./publish/api/azurefunctions.tar -C ./publish/api
          rm ./publish/api/azurefunctions.tar

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify required Key Vault secrets
        env:
          KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
        run: |
          set -euo pipefail
          if ! az keyvault secret show \
            --vault-name "$KEY_VAULT_NAME" \
            --name audit-hash-salt \
            --query id \
            -o tsv >/dev/null; then
            echo "FAIL: required Key Vault secret 'audit-hash-salt' is missing or inaccessible." >&2
            exit 1
          fi

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ vars.FUNCTION_APP_NAME }}
          package: ./publish/api

      - name: Set production API base URL
        env:
          API_HOSTNAME: ${{ vars.API_HOSTNAME }}
        run: |
          jq --arg url "https://${API_HOSTNAME}" \
            '.ApiBaseUrl = $url
             | .Diagnostics.WebVitalsEnabled = true
             | .Diagnostics.WebVitalsSampleRate = 1.0' \
            ./publish/app/wwwroot/appsettings.json > tmp.json \
            && mv tmp.json ./publish/app/wwwroot/appsettings.json
          rm -f ./publish/app/wwwroot/appsettings.json.br \
                ./publish/app/wwwroot/appsettings.json.gz

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          app_location: ./publish/app/wwwroot
          skip_app_build: true
          action: upload

      - name: Verify API health
        env:
          API_HOSTNAME: ${{ vars.API_HOSTNAME }}
        run: ./scripts/wait-api-ready.sh "https://${API_HOSTNAME}/api/health/ready"
