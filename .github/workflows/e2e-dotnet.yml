name: E2E (.NET)

on:
  workflow_dispatch:
  push:
    branches: [claude/dotnet-refactor]
    paths:
      - 'api/**'
      - 'app/**'
      - 'shared/**'
      - 'tests/**'
      - 'lfm.sln'
      - 'global.json'
      - '.github/workflows/e2e-dotnet.yml'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'app/**'
      - 'shared/**'
      - 'tests/**'
      - 'lfm.sln'
      - 'global.json'
      - '.github/workflows/e2e-dotnet.yml'

permissions:
  contents: read

concurrency:
  group: e2e-dotnet-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  NUGET_XMLDOC_MODE: skip
  PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Install Azure Functions Core Tools
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor > microsoft.gpg
          sudo mv microsoft.gpg /etc/apt/trusted.gpg.d/microsoft.gpg
          sudo sh -c 'echo "deb [arch=amd64] https://packages.microsoft.com/repos/microsoft-ubuntu-$(lsb_release -cs)-prod $(lsb_release -cs) main" > /etc/apt/sources.list.d/dotnetdev.list'
          sudo apt-get update
          sudo apt-get install -y azure-functions-core-tools-4

      - name: Restore
        run: dotnet restore lfm.sln

      - name: Build
        run: dotnet build lfm.sln -c Release --no-restore

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-dotnet-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: playwright-dotnet-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pwsh tests/Lfm.E2E/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pwsh tests/Lfm.E2E/bin/Release/net10.0/playwright.ps1 install-deps chromium

      - name: Run E2E
        run: >
          dotnet test tests/Lfm.E2E/Lfm.E2E.csproj
          -c Release --no-build --filter "Category!=Perf"
          --logger "trx;LogFileName=e2e.trx"
          --logger "console;verbosity=normal"
          --results-directory ./artifacts/e2e-results

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: e2e-results
          path: |
            ./artifacts/e2e-results
            tests/Lfm.E2E/bin/Release/net10.0/playwright-traces
            tests/Lfm.E2E/bin/Release/net10.0/TestResults
          if-no-files-found: ignore
          retention-days: 14
