name: Deploy Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: az group create --name lfm --location westeurope

      - name: Recover soft-deleted Key Vault if exists
        run: |
          DELETED_KV=$(az keyvault list-deleted --query "[?name=='lfm-kv-prot'].name" -o tsv)
          if [ -n "$DELETED_KV" ]; then
            echo "Recovering soft-deleted Key Vault lfm-kv-prot..."
            az keyvault recover --name lfm-kv-prot
          else
            echo "No soft-deleted Key Vault found, proceeding with fresh creation."
          fi

      - name: Deploy Bicep
        env:
          PRIVACY_EMAIL: ${{ vars.PRIVACY_EMAIL }}
        run: |
          az deployment group create \
            --resource-group lfm \
            --template-file infra/main.bicep \
            --parameters infra/parameters.prod.lfm.json \
            --parameters "privacyEmail=$PRIVACY_EMAIL"

      - name: Configure Functions custom domain and managed certificate
        run: |
          HOSTNAME="lfm-api.dinosauruskeksi.com"
          APP="lfm-functions"
          RG="lfm"

          # Add custom hostname (idempotent — no-op if already bound)
          EXISTING=$(az webapp config hostname list \
            --webapp-name "$APP" --resource-group "$RG" \
            --query "[?name=='$HOSTNAME'].name" -o tsv)

          if [ -z "$EXISTING" ]; then
            echo "Adding custom hostname $HOSTNAME..."
            az webapp config hostname add \
              --webapp-name "$APP" --resource-group "$RG" --hostname "$HOSTNAME"
          else
            echo "Hostname $HOSTNAME already bound."
          fi

          # Create managed certificate if one doesn't already exist
          THUMBPRINT=$(az webapp config ssl list --resource-group "$RG" \
            --query "[?subjectName=='$HOSTNAME'].thumbprint | [0]" -o tsv)

          if [ -z "$THUMBPRINT" ]; then
            echo "Creating managed certificate for $HOSTNAME..."
            THUMBPRINT=$(az webapp config ssl create \
              --resource-group "$RG" --name "$APP" --hostname "$HOSTNAME" \
              --query thumbprint -o tsv)
          else
            echo "Managed certificate already exists (thumbprint: $THUMBPRINT)."
          fi

          # Bind certificate with SNI (idempotent — re-binding same cert is a no-op)
          echo "Binding certificate to $HOSTNAME..."
          az webapp config ssl bind \
            --resource-group "$RG" --name "$APP" \
            --certificate-thumbprint "$THUMBPRINT" --ssl-type SNI

      - name: Configure SWA custom domain
        run: |
          HOSTNAME="lfm.dinosauruskeksi.com"
          SWA="lfm-swa"
          RG="lfm"

          # Set custom domain (idempotent — SWA auto-provisions managed certificate)
          EXISTING=$(az staticwebapp hostname list \
            --name "$SWA" --resource-group "$RG" \
            --query "[?domainName=='$HOSTNAME'].domainName" -o tsv)

          if [ -z "$EXISTING" ]; then
            echo "Adding custom domain $HOSTNAME to SWA..."
            az staticwebapp hostname set \
              --name "$SWA" --resource-group "$RG" --hostname "$HOSTNAME"
          else
            echo "SWA custom domain $HOSTNAME already configured."
          fi

      - name: Clean up auto-created App Insights resources
        run: |
          # Azure auto-creates a managed RG + workspace when migrating classic App
          # Insights. Now that App Insights is linked to lfm-logs, the managed RG
          # is orphaned. Also clean up any auto-created Smart Detection action groups.
          MANAGED_RG=$(az group list \
            --query "[?starts_with(name, 'ai_lfm-functions-insights_')].name" -o tsv)

          if [ -n "$MANAGED_RG" ]; then
            echo "Deleting orphaned managed resource group: $MANAGED_RG"
            az group delete --name "$MANAGED_RG" --yes --no-wait
          else
            echo "No orphaned managed resource group found."
          fi

          AUTO_AG=$(az monitor action-group list --resource-group lfm \
            --query "[?starts_with(name, 'ai_lfm-functions-insights_')].name" -o tsv)

          if [ -n "$AUTO_AG" ]; then
            echo "Deleting auto-created action group: $AUTO_AG"
            az monitor action-group delete \
              --name "$AUTO_AG" --resource-group lfm
          else
            echo "No auto-created action group found."
          fi

  deploy-functions:
    needs: infra
    uses: ./.github/workflows/deploy-functions.yml
